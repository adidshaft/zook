name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: zook_test
          POSTGRES_USER: zook
          POSTGRES_PASSWORD: zook
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zook -d zook_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://zook:zook@localhost:5432/zook_test
      APP_ENV: local
      API_MODE: backend
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_WEB_URL: http://127.0.0.1:3000
      MOBILE_API_BASE_URL: http://127.0.0.1:3000
      SESSION_SECRET: ci-session-key-0123456789ABCDEFabcdefXYZ
      ZOOK_QR_SECRET: ci-zook-qr-signing-key-0123456789ABCDEF
      STORAGE_PROVIDER: local
      STORAGE_LOCAL_DIR: .local/ci-uploads
      RATE_LIMIT_PROVIDER: memory
      OTP_FIXED_CODE_DEV: "000000"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate database client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Dashboard copy guard
        run: pnpm check:dashboard-copy

      - name: Launch gates
        run: pnpm check:launch-gates

      - name: Cleanup audit
        run: pnpm check:cleanup-audit

      - name: Dashboard dev-speak grep
        run: |
          targets=(
            apps/web/app/dashboard
            apps/web/app/desk
            apps/web/src/components/dashboard
            apps/web/src/components/dashboard-shell.tsx
            apps/web/src/components/desk-panel.tsx
            apps/web/src/components/notification-composer-panel.tsx
            apps/web/messages/dashboard
          )
          existing_targets=()
          for target in "${targets[@]}"; do
            if [ -e "$target" ]; then
              existing_targets+=("$target")
            fi
          done
          if grep -RInEi '(^|[^[:alnum:]_])(posture|drilling( into)?|seed this|mvp)([^[:alnum:]_]|$)' "${existing_targets[@]}"; then
            echo "Remove internal/dev-facing language from dashboard user surfaces."
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Dependency audit
        run: pnpm audit --audit-level high

      - name: Service tests
        run: pnpm test:services

      - name: DB-backed web tests
        run: pnpm test:db:prepare && RUN_DB_WEB_TESTS=1 ALLOW_DEV_OTP_RESPONSE=true pnpm test:web

      - name: Action web tests
        run: ALLOW_DEV_OTP_RESPONSE=true pnpm test:web:actions

      - name: Release preflight
        run: pnpm release:preflight

      - name: Local backend preflight
        run: APP_ENV=local API_MODE=backend pnpm preflight

      - name: Environment checks
        run: pnpm env:check
