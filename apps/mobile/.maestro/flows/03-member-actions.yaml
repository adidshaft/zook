appId: com.zook.app
name: 03-member-actions
tags:
  - role-member
---
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
    file: _helpers/login-as.yaml
    env:
      email: member@zook.local
      home_id: member-home-screen
      home_path: zook:///
- takeScreenshot: /tmp/zook-maestro/member/home.png

- openLink: zook:///progress
- extendedWaitUntil:
    visible:
      id: "progress-screen"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "tracking-log-workout"
    timeout: 15000
- takeScreenshot: /tmp/zook-maestro/member/tracking.png

- openLink: zook:///notifications
- extendedWaitUntil:
    visible:
      id: "notifications-screen"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Pickup order ready"
    direction: DOWN
    timeout: 10000
- tapOn:
    text: "Pickup order ready"
- extendedWaitUntil:
    visible:
      id: "shop-back-to-shop"
    timeout: 15000
- takeScreenshot: /tmp/zook-maestro/member/notifications.png

- openLink: zook:///scan
- extendedWaitUntil:
    visible:
      id: "scan-screen"
    timeout: 15000
- tapOn:
    id: "scan-manual-code"
    optional: true
- tapOn:
    text: "Enter code"
    optional: true
- tapOn:
    id: "scan-code-prefix"
- inputText: "AB"
- tapOn:
    id: "scan-code-digits"
- inputText: "1234"
- tapOn:
    id: "scan-submit-code"
    optional: true
- takeScreenshot: /tmp/zook-maestro/member/scan-code.png

- openLink: zook:///membership
- extendedWaitUntil:
    visible:
      id: "membership-screen"
    timeout: 15000
- tapOn:
    id: "membership-renew-button"
- tapOn:
    id: "membership-renewal-close"
- takeScreenshot: /tmp/zook-maestro/member/membership.png

- openLink: zook:///plans
- extendedWaitUntil:
    visible:
      id: "member-plan-screen"
    timeout: 15000
- tapOn:
    id: "plan-start-today"
    optional: true
- tapOn:
    id: "plan-row-first"
    optional: true
- tapOn:
    id: "plan-detail-send-feedback"
    optional: true
- tapOn:
    id: "plan-detail-feedback-input"
    optional: true
- inputText: "Felt good in E2E"
- hideKeyboard:
    optional: true
- tapOn:
    id: "plan-detail-feedback-send"
    optional: true
- takeScreenshot: /tmp/zook-maestro/member/plans.png

- openLink: zook:///classes
- extendedWaitUntil:
    visible:
      id: "member-classes-screen"
    timeout: 15000
- tapOn:
    id: "class-book-first"
    optional: true
- takeScreenshot: /tmp/zook-maestro/member/classes.png

- openLink: zook:///shop
- extendedWaitUntil:
    visible:
      id: "shop-shop-screen"
    timeout: 15000
- tapOn:
    id: "shop-product-first-increment"
    optional: true
- tapOn:
    id: "shop-mini-cart"
    optional: true
- tapOn:
    id: "shop-cart-checkout"
    optional: true
- tapOn:
    id: "shop-continue-payment"
    optional: true
- extendedWaitUntil:
    visible:
      id: "shop-continue-payment"
    timeout: 15000
    optional: true
- extendedWaitUntil:
    visible:
      id: "shop-back-to-shop"
    timeout: 15000
    optional: true
- takeScreenshot: /tmp/zook-maestro/member/shop-pickup.png

- openLink: zook:///assistant
- extendedWaitUntil:
    visible:
      id: "assistant-coming-soon-screen"
    timeout: 15000
- takeScreenshot: /tmp/zook-maestro/member/assistant.png

- openLink: zook:///gyms
- extendedWaitUntil:
    visible:
      id: "find-gyms-screen"
    timeout: 15000
- tapOn:
    id: "find-gym-row-first"
    optional: true
- extendedWaitUntil:
    visible:
      id: "gym-profile-screen"
    timeout: 15000
- takeScreenshot: /tmp/zook-maestro/member/find-gym-detail.png

- openLink: zook:///tracking-entry
- extendedWaitUntil:
    visible:
      id: "tracking-entry-screen"
    timeout: 15000
- tapOn:
    id: "tracking-entry-title"
- inputText: "Maestro workout"
- scrollUntilVisible:
    element:
      id: "tracking-entry-exercise-0-name"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "tracking-entry-exercise-0-name"
- inputText: "Push press"
- hideKeyboard:
    optional: true
- tapOn:
    id: "tracking-entry-exercise-0-sets"
- inputText: "3"
- hideKeyboard:
    optional: true
- tapOn:
    id: "tracking-entry-exercise-0-reps"
- inputText: "8"
- hideKeyboard:
    optional: true
- tapOn:
    id: "tracking-entry-save"
    optional: true
- tapOn:
    text: "Save workout"
    optional: true
- extendedWaitUntil:
    visible:
      id: "progress-screen"
    timeout: 30000
- openLink: zook:///tracking-history
- extendedWaitUntil:
    visible:
      id: "tracking-history-workout-first"
    timeout: 30000
- takeScreenshot: /tmp/zook-maestro/member/tracking-history.png
