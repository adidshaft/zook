appId: com.zook.app
name: 02b-onboarding-permissions
tags:
  - onboarding
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: zook:///onboarding
- tapOn:
    point: "67%,55%"
    optional: true
- tapOn:
    text: "Tap to skip"
    optional: true
- openLink: zook:///onboarding/language
- extendedWaitUntil:
    visible:
      id: "onboarding-language-screen"
    timeout: 12000
- tapOn:
    id: "onboarding-language-en"
- tapOn:
    id: "onboarding-language-continue"
- extendedWaitUntil:
    visible:
      id: "onboarding-value-props-screen"
    timeout: 12000
- tapOn:
    id: "onboarding-value-continue"
- extendedWaitUntil:
    visible:
      id: "onboarding-permissions-screen"
    timeout: 12000
- tapOn:
    id: "onboarding-allow-permissions"
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "Allow While Using App"
    optional: true
- openLink: zook:///login
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 15000
- takeScreenshot: /tmp/zook-maestro/onboarding/permissions.png
