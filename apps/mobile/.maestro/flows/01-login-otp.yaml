appId: com.zook.app
name: 01-login-otp
tags:
  - auth
---
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
    file: _helpers/login-as.yaml
    env:
      email: member@zook.local
      home_id: member-home-screen
- takeScreenshot: /tmp/zook-maestro/member/login-persisted.png
- stopApp
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      id: "member-home-screen"
    timeout: 20000

- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
    file: _helpers/login-as.yaml
    env:
      email: owner@zook.local
      home_id: owner-home-screen
- takeScreenshot: /tmp/zook-maestro/owner/login.png

- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
