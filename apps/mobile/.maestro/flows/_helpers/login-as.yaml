appId: com.zook.app
name: login-as
---
# Reusable helper: pass `email` and `home_id`.
- openLink: zook:///login
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "Open"
    optional: true
- runFlow:
    file: complete-language-if-needed.yaml
- openLink: zook:///login
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Cancel"
    optional: true
- tapOn:
    id: "login-method-email"
    optional: true
- tapOn:
    text: "Email"
    optional: true
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 15000
- tapOn:
    id: "login-email"
    optional: true
- tapOn:
    id: "login-phone"
    optional: true
- eraseText:
    optional: true
- inputText: ${email}
- hideKeyboard:
    optional: true
- tapOn:
    id: "login-send-code"
    optional: true
- tapOn:
    text: "Send Code"
    optional: true
- extendedWaitUntil:
    visible:
      id: "login-verify-code"
    timeout: 15000
- tapOn:
    id: "login-otp"
    optional: true
- tapOn:
    id: "login-otp-cells"
    optional: true
- inputText: "000000"
- tapOn:
    id: "login-verify-code"
    optional: true
- tapOn:
    text: "Verify & Sign In"
    optional: true
- extendedWaitUntil:
    visible:
      id: ${home_id}
    timeout: 10000
    optional: true
- openLink:
    link: ${home_path}
    optional: true
- extendedWaitUntil:
    visible:
      id: ${home_id}
    timeout: 30000
