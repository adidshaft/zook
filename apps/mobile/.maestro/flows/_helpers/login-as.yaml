appId: com.zook.app
name: login-as
---
# Reusable helper: pass `email` and `home_id`.
- openLink: zook:///login
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    point: "67%,54%"
    optional: true
- runFlow:
    file: complete-language-if-needed.yaml
- openLink: zook:///login
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    point: "67%,54%"
    optional: true
- extendedWaitUntil:
    visible:
      id: "login-method-email"
    timeout: 15000
- tapOn:
    id: "login-method-email"
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 15000
- tapOn:
    id: "login-email"
- inputText: ${email}
- tapOn:
    id: "login-send-code"
- extendedWaitUntil:
    visible:
      id: "login-otp-cells"
    timeout: 15000
- tapOn:
    id: "login-otp-cells"
- inputText: "000000"
- extendedWaitUntil:
    visible:
      id: ${home_id}
    timeout: 30000
