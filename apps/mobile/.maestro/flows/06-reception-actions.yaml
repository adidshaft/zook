appId: com.zook.app
name: 06-reception-actions
tags:
  - role-reception
---
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
    file: _helpers/open-qa-shortcut.yaml
    env:
      shortcut_id: qa-reception-home
      home_id: reception-home-screen
- takeScreenshot: /tmp/zook-maestro/reception/home.png

- tapOn:
    id: "reception-verify-code"
- inputText: "ZZ0000"
- hideKeyboard:
    optional: true
- tapOn:
    id: "reception-verify-code-button"
- takeScreenshot: /tmp/zook-maestro/reception/verify-code.png
- tapOn:
    text: "Dismiss"
    optional: true

- openLink: zook:///reception/members
- extendedWaitUntil:
    visible:
      id: "reception-member-search"
    timeout: 15000
- tapOn:
    point: "37%,94%"
- extendedWaitUntil:
    visible:
      id: "reception-member-search"
    timeout: 15000
- tapOn:
    id: "reception-member-search"
- inputText: "desk-test-member@zook.local"
- extendedWaitUntil:
    visible:
      id: "reception-member-row-first"
    timeout: 15000
- tapOn:
    id: "reception-member-row-first"
- scrollUntilVisible:
    element:
      id: "reception-attendance-reason"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "reception-attendance-reason"
- inputText: "Manual desk check-in"
- pressKey: Enter
- scrollUntilVisible:
    element:
      id: "reception-record-attendance"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "reception-record-attendance"
- extendedWaitUntil:
    visible:
      id: "privileged-pin-cells"
    timeout: 10000
- tapOn:
    id: "privileged-pin-cells"
- inputText: "1234"
- hideKeyboard:
    optional: true
- extendedWaitUntil:
    visible:
      id: "reception-attendance-status"
    timeout: 15000
- takeScreenshot: /tmp/zook-maestro/reception/member-actions.png

- launchApp:
    clearState: true
- runFlow:
    file: _helpers/open-qa-shortcut.yaml
    env:
      shortcut_id: qa-reception-payments
      home_id: reception-payment-amount
- extendedWaitUntil:
    visible:
      id: "reception-payment-amount"
    timeout: 15000
- tapOn:
    id: "reception-payment-amount"
- inputText: "1999"
- hideKeyboard:
    optional: true
- scrollUntilVisible:
    element:
      id: "reception-payment-reference"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "reception-payment-reference"
- inputText: "MAESTRO1999"
- hideKeyboard:
    optional: true
- scrollUntilVisible:
    element:
      id: "reception-record-payment"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "reception-record-payment"
- extendedWaitUntil:
    visible:
      id: "privileged-pin-cells"
    timeout: 10000
- tapOn:
    id: "privileged-pin-cells"
- inputText: "1234"
- extendedWaitUntil:
    visible: "Recorded .* by DIRECT UPI\\."
    timeout: 15000
- takeScreenshot: /tmp/zook-maestro/reception/payment.png

- launchApp:
    clearState: true
- runFlow:
    file: _helpers/open-qa-shortcut.yaml
    env:
      shortcut_id: qa-reception-orders
      home_id: reception-verify-pickup-code
- scrollUntilVisible:
    element:
      id: "reception-pickup-code"
    direction: UP
    timeout: 15000
- tapOn:
    id: "reception-pickup-code"
- inputText: "AS-PICK-101"
- pressKey: Enter
- scrollUntilVisible:
    element:
      id: "reception-verify-pickup-code"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "reception-verify-pickup-code"
- extendedWaitUntil:
    visible:
      id: "reception-order-row-first"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "fulfill-button-first"
    direction: DOWN
    timeout: 15000
    centerElement: true
- tapOn:
    id: "fulfill-button-first"
- extendedWaitUntil:
    visible:
      id: "privileged-pin-cells"
    timeout: 10000
- tapOn:
    id: "privileged-pin-cells"
- inputText: "1234"
- extendedWaitUntil:
    visible: "Pickup fulfilled."
    timeout: 15000
- takeScreenshot: /tmp/zook-maestro/reception/orders.png

- launchApp:
    clearState: true
- runFlow:
    file: _helpers/open-qa-shortcut.yaml
    env:
      shortcut_id: qa-reception-scan
      home_id: scan-screen
- extendedWaitUntil:
    visible:
      id: "scan-screen"
    timeout: 15000
- tapOn:
    id: "scan-manual-code"
    optional: true
- tapOn:
    text: "Enter code"
    optional: true
- takeScreenshot: /tmp/zook-maestro/reception/scan.png
