appId: com.zook.app
name: 04-owner-actions
tags:
  - role-owner
---
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
    file: _helpers/login-as.yaml
    env:
      email: owner@zook.local
      home_id: owner-home-screen
      home_path: zook:///owner
- takeScreenshot: /tmp/zook-maestro/owner/home.png

- openLink: zook:///owner/members
- extendedWaitUntil:
    visible:
      id: "owner-members-screen"
    timeout: 15000
- tapOn:
    id: "member-row-first"
    optional: true
- takeScreenshot: /tmp/zook-maestro/owner/members.png

- openLink: zook:///owner/approvals
- extendedWaitUntil:
    visible:
      id: "owner-approvals-screen"
    timeout: 15000
- tapOn:
    id: "approve-button-first"
    optional: true
- tapOn:
    id: "approve-attendance-first"
    optional: true
- takeScreenshot: /tmp/zook-maestro/owner/approvals.png

- openLink: zook:///owner/billing
- extendedWaitUntil:
    visible:
      id: "owner-billing-screen"
    timeout: 15000
- takeScreenshot: /tmp/zook-maestro/owner/billing.png

- openLink: zook:///owner/more
- extendedWaitUntil:
    visible:
      id: "owner-more-screen"
    timeout: 15000
- takeScreenshot: /tmp/zook-maestro/owner/more.png

- openLink: zook:///owner
- extendedWaitUntil:
    visible:
      id: "owner-home-screen"
    timeout: 20000
- takeScreenshot: /tmp/zook-maestro/owner/owner-return.png

- openLink: zook:///notifications
- extendedWaitUntil:
    visible:
      id: "notifications-screen"
    timeout: 15000
- tapOn:
    id: "notifications-mark-all-read"
    optional: true
- takeScreenshot: /tmp/zook-maestro/owner/notifications.png
