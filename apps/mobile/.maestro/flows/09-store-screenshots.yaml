appId: com.zook.app
name: 09-store-screenshots
tags:
  - store-screenshots
---
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
    file: _helpers/complete-language-if-needed.yaml
- openLink: zook:///
- waitForAnimationToEnd:
    timeout: 1500
- extendedWaitUntil:
    visible:
      id: "member-home-screen"
    timeout: 30000
- tapOn:
    point: "95%,94%"
    optional: true
- takeScreenshot: /Users/amanpandey/projects/zook/artifacts/app-store-screenshots-20260522/member-home.png

- openLink: zook:///plan
- waitForAnimationToEnd:
    timeout: 1500
- extendedWaitUntil:
    visible:
      id: "member-plan-screen"
    timeout: 15000
- tapOn:
    id: "plan-schedule-first"
    optional: true
- takeScreenshot: /Users/amanpandey/projects/zook/artifacts/app-store-screenshots-20260522/member-plan.png

- openLink: zook:///
- waitForAnimationToEnd:
    timeout: 1500
- extendedWaitUntil:
    visible:
      id: "member-home-screen"
    timeout: 15000
- tapOn:
    point: "38%,88%"
- extendedWaitUntil:
    visible:
      id: "scan-screen"
    timeout: 15000
- takeScreenshot: /Users/amanpandey/projects/zook/artifacts/app-store-screenshots-20260522/member-scan.png

- openLink: zook:///progress
- waitForAnimationToEnd:
    timeout: 1500
- extendedWaitUntil:
    visible:
      id: "progress-screen"
    timeout: 15000
- takeScreenshot: /Users/amanpandey/projects/zook/artifacts/app-store-screenshots-20260522/member-progress.png

- openLink: zook:///notifications
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    id: "notification-detail-close"
    optional: true
- tapOn:
    point: "50%,50%"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- extendedWaitUntil:
    visible: "Inbox"
    timeout: 15000
- takeScreenshot: /Users/amanpandey/projects/zook/artifacts/app-store-screenshots-20260522/notifications.png

- launchApp:
    clearState: true
    clearKeychain: true
- takeScreenshot: /Users/amanpandey/projects/zook/artifacts/app-store-screenshots-20260522/owner-today.png

- openLink: zook:///owner/approvals
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible:
      id: "pending-approvals-list"
    timeout: 15000
- takeScreenshot: /Users/amanpandey/projects/zook/artifacts/app-store-screenshots-20260522/owner-approvals.png

- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "trainer-home-screen"
    timeout: 30000
- takeScreenshot: /Users/amanpandey/projects/zook/artifacts/app-store-screenshots-20260522/trainer-home.png

- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "reception-home-screen"
    timeout: 30000
- tapOn:
    id: "reception-verify-code"
- eraseText
- inputText: "PU-9142"
- hideKeyboard:
    optional: true
- tapOn:
    text: "Verify Code"
- extendedWaitUntil:
    visible: "Pickup verified"
    timeout: 15000
- takeScreenshot: /Users/amanpandey/projects/zook/artifacts/app-store-screenshots-20260522/reception-desk.png
