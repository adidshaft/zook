appId: com.zook.app
name: integration-member-shop-checkout
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: zook:///login
- tapOn:
    point: "67%,55%"
    optional: true
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 15000
- tapOn:
    id: "login-email"
- inputText: ${email}
- tapOn:
    id: "login-send-code"
- extendedWaitUntil:
    visible:
      id: "login-otp-cells"
    timeout: 15000
- tapOn:
    id: "login-otp-cells"
- inputText: "000000"
- extendedWaitUntil:
    visible:
      id: "member-home-screen"
    timeout: 30000
- openLink: zook:///shop
- extendedWaitUntil:
    visible:
      id: "shop-shop-screen"
    timeout: 30000
- tapOn:
    id: "shop-product-first-increment"
- extendedWaitUntil:
    visible:
      id: "shop-mini-cart"
    timeout: 15000
- tapOn:
    id: "shop-mini-cart"
- tapOn:
    id: "shop-cart-checkout"
- tapOn:
    id: "shop-continue-payment"
- extendedWaitUntil:
    visible:
      id: "shop-back-to-shop"
    timeout: 30000
