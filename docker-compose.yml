services:
  postgres:
    image: postgres:16-alpine
    container_name: zook-postgres
    environment:
      POSTGRES_DB: zook
      POSTGRES_USER: zook
      POSTGRES_PASSWORD: zook
    ports:
      - "5432:5432"
    volumes:
      - zook-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zook -d zook"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  zook-postgres-data:
