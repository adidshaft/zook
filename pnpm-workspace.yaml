packages:
  - "apps/*"
  - "packages/*"

overrides:
  fast-xml-builder: ">=1.1.7"
  shell-quote: "1.8.4"
  undici: "6.27.0"
  vite@<=6.4.2: "6.4.3"
  ws@>=6.0.0 <6.2.4: "6.2.4"
  ws@>=7.0.0 <7.5.11: "7.5.11"
  ws@>=8.0.0 <8.21.0: "8.21.0"

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@prisma/client"
  - "@prisma/engines"
  - "@sentry/cli"
  - "@swc/core"
  - "esbuild"
  - "prisma"
  - "sharp"

allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  prisma: true
  sharp: true
